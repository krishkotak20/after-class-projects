<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <p>Sum of arguments and Math objects</p>
    <p id="demo"></p>

    <script>
        function sumAll() {
            let sum = 0;
            for (let i = 0; i < arguments.length; i++) {
                sum += arguments[i];
            }
            return sum;
        }

        // changed numbers
        document.getElementById("demo").innerHTML = sumAll(5, 20, 300, 42, 99);

        // changed math values too
        let value = Math.sin(30);
        document.write("Sin 30 is : " + value + "<br>");

        let value1 = Math.cos(60);
        document.write("Cos 60 is : " + value1 + "<br>");

        let value2 = Math.tan(15);
        document.write("Tan 15 is : " + value2 + "<br>");
    </script>

</body>

</html>
