<!DOCTYPE html>
<html>

<head>
    <style>
        div.relative {
            position: relative;
            left: 30px;
            border: 3px solid #73AD21;
        }

        div.fixed {
            position: fixed;
            left: 30px;
            border: 3px solid #73AD21;
        }

        div.absolute {
            position: absolute;
            left: 30px;
            border: 3px solid #73AD21;
        }

        div.static {
            position: static;
            left: 30px;
            border: 3px solid #73AD21;
        }
    </style>
</head>

<body>
</body>
</head>

<body>
    <h2>positions</h2>
    <p>hello</p>
    <div class="relative">
        hi
    </div><br><br>
    <div class="fixed">
        football
    </div><br><br>
    <div class="absolute">
hello
    </div><br><br>
    <div class="static">
     hi
    </div>
</body>

</html>
