<!DOCTYPE html>
<html>

<body>
    <p>football</p>
    <p id="demo"></p>

    <script>
        function sumAll() {
            let sum = 0;
            for (let i = 0; i < arguments.length; i++) {
                sum += arguments[i];
            }
            return sum;
        }

        document.getElementById("demo").innerHTML =
            sumAll(1, 123, 500, 115, 44, 88);

        // Convert degrees to radians
        function degToRad(deg) {
            return deg * Math.PI / 180;
        }

        document.write("Sin 45° is: " + Math.sin(degToRad(45)) + "<br>");
        document.write("Cos 45° is: " + Math.cos(degToRad(45)) + "<br>");
        document.write("Tan 45° is: " + Math.tan(degToRad(45)) + "<br>");
    </script>
</body>

</html>
